<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- Background blanc -->
  <rect width="220" height="80" fill="white"/>

  <!-- VILBERT text - vert foncé, gras -->
  <text x="8" y="44"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="36"
    fill="#1a5c28"
    letter-spacing="-1">VILBERT</text>

  <!-- Barre jaune -->
  <rect x="8" y="50" width="200" height="5" fill="#f5b800"/>

  <!-- Barre orange/jaune foncé -->
  <rect x="8" y="57" width="200" height="3" fill="#e8a000"/>

  <!-- HYDRO text - gris foncé, aligné à droite -->
  <text x="212" y="76"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="16"
    fill="#333333"
    text-anchor="end"
    letter-spacing="3">HYDRO</text>
</svg>
